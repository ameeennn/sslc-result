    <script>
        const dobInput = document.getElementById('dob');
        const regnoInput = document.getElementById('regno');
        const resultForm = document.getElementById('resultForm');
        const errorBox = document.getElementById('errorBox');
        const dobHint = document.getElementById('dobHint');

        dobInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, ''); // Remove non-digits
            let formatted = '';

            // Smart Padding for Day (First Segment)
            if (value.length === 1) {
                // If user types a number > 3, it can't be a double digit starting with that number (except for 30,31)
                // So if it's 4-9, we auto-pad with 0
                if (parseInt(value) > 3) {
                    value = '0' + value;
                }
            }

            // Smart Padding for Month (Second Segment)
            if (value.length === 3) {
                // value is DD + M. Check if M is > 1.
                let monthDigit = value.substring(2, 3);
                if (parseInt(monthDigit) > 1) {
                    value = value.substring(0, 2) + '0' + monthDigit;
                }
            }

            // Construction with slashes
            if (value.length > 0) {
                formatted = value.substring(0, 2);
                if (value.length > 2) {
                    formatted += '/' + value.substring(2, 4);
                }
                if (value.length > 4) {
                    formatted += '/' + value.substring(4, 8);
                }
            }

            e.target.value = formatted;

            // Visual feedback
            if (formatted.length === 10) {
                dobHint.textContent = "Format looks correct!";
                dobHint.classList.replace('text-slate-500', 'text-green-500');
            } else {
                dobHint.textContent = "Enter DD/MM/YYYY";
                dobHint.classList.replace('text-green-500', 'text-slate-500');
            }
        });

        // Smart padding on Blur (when user leaves field)
        dobInput.addEventListener('blur', function (e) {
            let parts = e.target.value.split('/');
            if (parts[0] && parts[0].length === 1) parts[0] = '0' + parts[0];
            if (parts[1] && parts[1].length === 1) parts[1] = '0' + parts[1];
            e.target.value = parts.filter(p => p !== "").join('/');
        });

        resultForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const regno = regnoInput.value.trim();
            const dob = dobInput.value.trim();

            if (regno === "") {
                showError("Please enter a register number.");
                return;
            }

            if (dob.length < 10) {
                showError("Please complete the DOB (DD/MM/YYYY).");
                return;
            }

            // Final check on date components
            const dateParts = dob.split('/');
            const day = parseInt(dateParts[0]);
            const month = parseInt(dateParts[1]);
            const year = parseInt(dateParts[2]);

            if (day > 31 || month > 12 || year < 1900 || year > 2025) {
                showError("The date entered seems invalid.");
                return;
            }

            // Encode the DOB for URL
            const encodedDob = encodeURIComponent(dob);

            // Base URL as requested
            const baseUrl = "https://results.kite.kerala.gov.in/result_sslc__k1te20269995994069.html";
            const finalUrl = `${baseUrl}?regno=${regno}&date1=${encodedDob}&Submit=View+Result`;

            // Immediate redirection
            window.location.href = finalUrl;
        });

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden');
            setTimeout(() => {
                errorBox.classList.add('hidden');
            }, 4000);
        }

        // --- NEW TABS LOGIC ---
        const individualTab = document.getElementById('individualTab');
        const schoolTab = document.getElementById('schoolTab');
        const individualSection = document.getElementById('individualSection');
        const schoolSection = document.getElementById('schoolSection');
        const schoolResults = document.getElementById('schoolResults');

        individualTab.addEventListener('click', () => {
            individualSection.classList.remove('hidden');
            schoolSection.classList.add('hidden');
            schoolResults.classList.add('hidden');
            individualTab.classList.add('bg-blue-600', 'text-white');
            individualTab.classList.remove('text-slate-400');
            schoolTab.classList.remove('bg-blue-600', 'text-white');
            schoolTab.classList.add('text-slate-400');
        });

        schoolTab.addEventListener('click', () => {
            schoolSection.classList.remove('hidden');
            individualSection.classList.add('hidden');
            // If results exist, show them
            if (schoolResults.innerHTML.trim() !== "") {
                schoolResults.classList.remove('hidden');
            }
            schoolTab.classList.add('bg-blue-600', 'text-white');
            schoolTab.classList.remove('text-slate-400');
            individualTab.classList.remove('bg-blue-600', 'text-white');
            individualTab.classList.add('text-slate-400');
        });

        // --- SCHOOL FETCH LOGIC ---
        const fetchSchoolBtn = document.getElementById('fetchSchoolBtn');

        fetchSchoolBtn.addEventListener('click', async () => {
            let district = document.getElementById('districtCode').value.trim();
            const school = document.getElementById('schoolCode').value.trim();

            if (!district || !school) {
                showError("Enter district and school code.");
                return;
            }

            if (district.length === 1) district = '0' + district;

            const cacheKey = `sslc_v2_${district}_${school}`;
            const cached = localStorage.getItem(cacheKey);

            // CHECK CACHE FIRST (24 Hour Expiry)
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    if (Date.now() - parsed.timestamp < 86400000) {
                        console.log("Loading from cache...");
                        schoolResults.classList.remove('hidden');
                        renderSchoolResults(parsed.data, school);
                        return;
                    }
                } catch (e) { localStorage.removeItem(cacheKey); }
            }

            const targetUrl = `https://results.kite.kerala.gov.in/SSLC_SCHOOLWISE/${district}/${school}.json`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

            try {
                schoolResults.classList.remove('hidden');
                schoolResults.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 space-y-4">
                        <div class="w-10 h-10 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
                        <p class="text-slate-400 font-medium">Fetching records...</p>
                    </div>
                `;

                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Fetch failed");

                const data = await response.json();

                // SAVE TO CACHE
                localStorage.setItem(cacheKey, JSON.stringify({
                    data: data,
                    timestamp: Date.now()
                }));

                renderSchoolResults(data, school);

            } catch (err) {
                console.error("Fetch Error:", err);
                schoolResults.innerHTML = `
                    <div class="bg-amber-500/10 border border-amber-500/20 text-amber-200 p-6 rounded-2xl text-center">
                        <p class="font-bold">Fetch Restricted</p>
                        <p class="text-xs opacity-70 mt-2 mb-4 leading-relaxed">
                            The server is blocking the automated fetch. Open directly to see JSON:
                        </p>
                        <a href="${targetUrl}" target="_blank" class="btn-primary px-6 py-3 rounded-xl text-white font-bold inline-flex items-center space-x-2">
                            <span>View Raw Results</span>
                        </a>
                    </div>
                `;
            }
        });

        function renderSchoolResults(data, schoolCode) {
            let students = [];
            if (Array.isArray(data)) students = data;
            else if (data && typeof data === 'object') {
                students = data.students || data.data || data.results ||
                    Object.values(data).find(v => Array.isArray(v)) || [];
            }

            if (students.length === 0) {
                schoolResults.innerHTML = `<div class="text-center text-slate-500 py-12">No records found.</div>`;
                return;
            }

            // Extract all subject keys dynamically
            const exclude = ['regnum', 'Names', 'School', 'Sex', 'category', 'Caste', 'status', 'ied', 'grace_mark'];
            const allSubjects = Array.from(new Set(students.flatMap(s =>
                Object.keys(s).filter(k => !exclude.includes(k))
            )));

            // STRICT RESULT DETECTION (D, E, E+ = FAIL | D+ = PASS)
            const getResult = (s) => {
                const failGrades = ["D", "E", "E+"];
                const subjectGrades = allSubjects.map(sub => s[sub]);
                
                // Check if any subject has a fail grade
                if (subjectGrades.some(g => failGrades.includes(g))) return "FAIL";

                const stat = (s.status || "").toUpperCase();
                return stat.includes("ELIGIBLE") ? "PASS" : "FAIL";
            };

            const isFullAPlus = (s) => allSubjects.every(sub => s[sub] === "A+");

            const total = students.length;
            const passed = students.filter(s => getResult(s) === 'PASS').length;
            const failed = total - passed;
            const fullAPlus = students.filter(s => isFullAPlus(s)).length;
            const passPercentage = total > 0 ? ((passed / total) * 100).toFixed(2) : 0;

            let html = `
                <div class="space-y-6">
                    <!-- Stats Dashboard (Sticky) -->
                    <div class="sticky top-0 z-20 bg-slate-900/80 backdrop-blur-md pt-2 pb-4 border-b border-white/5">
                        <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-5">
                            <div class="stat-card">
                                <p class="text-[9px] uppercase text-slate-500 font-bold">Total</p>
                                <p class="text-xl font-bold text-white">${total}</p>
                            </div>
                            <div class="stat-card">
                                <p class="text-[9px] uppercase text-green-500/70 font-bold">Passed</p>
                                <p class="text-xl font-bold text-green-400">${passed}</p>
                            </div>
                            <div class="stat-card">
                                <p class="text-[9px] uppercase text-red-500/70 font-bold">Failed</p>
                                <p class="text-xl font-bold text-red-400">${failed}</p>
                            </div>
                            <div class="stat-card">
                                <p class="text-[9px] uppercase text-blue-500/70 font-bold">Pass %</p>
                                <p class="text-xl font-bold text-blue-400">${passPercentage}%</p>
                            </div>
                            <div class="stat-card col-span-2 sm:col-span-1 border-blue-500/30 bg-blue-500/5">
                                <p class="text-[9px] uppercase text-blue-400 font-black">Full A+</p>
                                <p class="text-xl font-black text-blue-400">${fullAPlus}</p>
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4">
                            <input type="text" id="searchStudent" placeholder="Search name or reg no..." class="input-field flex-1 px-5 py-4 rounded-2xl text-white">
                            <select id="filterStatus" class="input-field px-5 py-4 rounded-2xl text-white bg-slate-900">
                                <option value="all">All Students</option>
                                <option value="PASS">Passed Only</option>
                                <option value="FAIL">Failed Only</option>
                                <option value="A+">Full A+ Only</option>
                            </select>
                        </div>
                    </div>

                    <!-- Top Scroll Sync -->
                    <div id="topScroll" class="overflow-x-auto h-2 mb-[-1.5rem] opacity-0 hover:opacity-100 transition-opacity">
                        <div id="topScrollContent" style="height: 1px;"></div>
                    </div>

                    <!-- Table Container -->
                    <div id="mainScroll" class="overflow-auto rounded-2xl border border-white/10 bg-slate-900/30 max-h-[600px] relative shadow-inner">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 z-10">
                                <tr class="bg-slate-800 text-[10px] uppercase tracking-wider text-slate-400">
                                    <th class="p-4 font-bold border-b border-white/10 shadow-sm">Reg No</th>
                                    <th class="p-4 font-bold border-b border-white/10 shadow-sm min-w-[150px]">Name</th>
                                    <th class="p-4 font-bold border-b border-white/10 shadow-sm">Result</th>
                                    ${allSubjects.map(sub => `<th class="p-4 font-bold border-b border-white/10 shadow-sm text-center min-w-[70px] whitespace-nowrap">${sub.replace('First Language ', 'L1 ').replace('Second Language ', 'L2 ')}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody id="studentTableBody" class="text-sm">
                                <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            schoolResults.innerHTML = html;

            const tableBody = document.getElementById('studentTableBody');
            const searchInput = document.getElementById('searchStudent');
            const filterStatus = document.getElementById('filterStatus');
            const mainScroll = document.getElementById('mainScroll');
            const topScroll = document.getElementById('topScroll');
            const topScrollContent = document.getElementById('topScrollContent');

            // SYNC SCROLLBARS
            topScrollContent.style.width = mainScroll.scrollWidth + "px";
            topScroll.onscroll = () => mainScroll.scrollLeft = topScroll.scrollLeft;
            mainScroll.onscroll = () => topScroll.scrollLeft = mainScroll.scrollLeft;

            function displayStudents() {
                const keyword = searchInput.value.toLowerCase();
                const filter = filterStatus.value;

                let filtered = students.filter(s => {
                    const name = (s.Names || "").toLowerCase();
                    const reg = String(s.regnum || "");
                    const matchSearch = name.includes(keyword) || reg.includes(keyword);
                    const res = getResult(s);
                    const isAPlus = isFullAPlus(s);

                    let matchStatus = filter === 'all';
                    if (filter === 'PASS') matchStatus = res === 'PASS';
                    if (filter === 'FAIL') matchStatus = res === 'FAIL';
                    if (filter === 'A+') matchStatus = isAPlus;

                    return matchSearch && matchStatus;
                });

                tableBody.innerHTML = filtered.map(s => {
                    const res = getResult(s);
                    const isAPlus = isFullAPlus(s);
                    return `
                        <tr class="hover:bg-white/5 transition-colors group ${isAPlus ? 'bg-blue-500/5' : ''}">
                            <td class="p-4 border-b border-white/5 font-mono text-slate-500">${s.regnum}</td>
                            <td class="p-4 border-b border-white/5 font-bold ${isAPlus ? 'text-blue-400' : 'text-white'} whitespace-nowrap">${s.Names}</td>
                            <td class="p-4 border-b border-white/5">
                                <span class="px-2 py-0.5 rounded-full text-[9px] font-black
                                    ${res === 'PASS' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}">
                                    ${res}
                                </span>
                            </td>
                            ${allSubjects.map(sub => {
                        const grade = s[sub] || '-';
                        return `<td class="p-4 border-b border-white/5 text-center font-bold ${grade === 'A+' ? 'text-blue-400' : (["D", "E", "E+"].includes(grade) ? 'text-red-400' : 'text-slate-500')}">${grade}</td>`;
                    }).join('')}
                        </tr>
                    `;
                }).join('');

                if (filtered.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="${allSubjects.length + 3}" class="p-10 text-center text-slate-500">No matching students found</td></tr>`;
                }
            }

            displayStudents();
            searchInput.addEventListener('input', displayStudents);
            filterStatus.addEventListener('change', displayStudents);
        }

        // --- URL PARAMETER HANDLING ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type');

            if (type === 'school') {
                const district = urlParams.get('district_code');
                const school = urlParams.get('school_code');
                if (district && school) {
                    document.getElementById('districtCode').value = district;
                    document.getElementById('schoolCode').value = school;
                    // Switch to school tab
                    schoolTab.click();
                    // Auto-fetch for school
                    setTimeout(() => fetchSchoolBtn.click(), 100);
                }
            } else if (type === 'individual') {
                const reg = urlParams.get('reg_no');
                const dob = urlParams.get('dob');
                if (reg) document.getElementById('regno').value = reg;
                if (dob) document.getElementById('dob').value = dob;
                // Switches to individual tab (default, but explicit for clarity)
                individualTab.click();
                // NO auto-fetch for individual as per requirement
            }
        });
    </script>
    </script>
</body>
