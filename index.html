    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(17, 24, 39, 1) 0px, transparent 50%);
        }

            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);

            outline: none;
        }

            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);

<body class="min-h-screen flex flex-col text-slate-200">

    <header class="w-full py-6 px-6">
        <div class="max-w-7xl mx-auto flex items-center justify-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">SSLC Result <span class="text-blue-400 text-sm font-medium ml-1">Portal</span></h1>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <div class="glass-card rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-50"></div>
                
                <div class="mb-8">
                    <h2 class="text-2xl font-semibold text-white">Check Your Result</h2>
                    <p class="text-slate-400 text-sm mt-1">Directly connects to the official result server.</p>
                </div>

                <form id="resultForm" class="space-y-6">
                    <!-- Register Number -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Register Number</label>
                        <input 
                            type="text" 
                            id="regno" 
                            inputmode="numeric"
                            placeholder="e.g. 333333" 
                            required
                            class="input-field w-full px-5 py-4 rounded-2xl text-white placeholder-slate-600"
                        >
                    </div>

                    <!-- Date of Birth with Smart Logic -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Date of Birth</label>
                        <div class="relative">
                            <input 
                                type="text" 
                                id="dob" 
                                inputmode="numeric"
                                placeholder="DD/MM/YYYY" 
                                required
                                maxlength="10"
                                class="input-field w-full px-5 py-4 rounded-2xl text-white placeholder-slate-600"
                            >
                            <div class="absolute right-5 top-1/2 -translate-y-1/2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </div>
                        </div>
                        <p id="dobHint" class="text-[10px] text-slate-500 mt-1 ml-1 transition-all">Type your birth date, we'll format it automatically.</p>
                    </div>

                    <div id="errorBox" class="hidden animate-pulse bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl">
                    </div>

                    <button 
                        type="submit" 
                        class="btn-primary w-full py-4 rounded-2xl text-white font-bold flex items-center justify-center space-x-2 group"
                    >
                        <span>Fetch Result</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </form>
            </div>

            <!-- Footer info -->
            <div class="mt-8 text-center space-y-4">
                <div class="text-slate-500 text-xs font-medium">
                    Built for <span class="text-blue-400">ameeennn.github.io</span>
                </div>
                <div class="flex justify-center space-x-4 opacity-50 grayscale hover:grayscale-0 transition-all">
                    <!-- Placeholder for small logos if needed -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const dobInput = document.getElementById('dob');
        const regnoInput = document.getElementById('regno');
        const resultForm = document.getElementById('resultForm');
        const errorBox = document.getElementById('errorBox');
        const dobHint = document.getElementById('dobHint');

        dobInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, ''); // Remove non-digits
            let formatted = '';

            // Smart Padding for Day (First Segment)
            if (value.length === 1) {
                // If user types a number > 3, it can't be a double digit starting with that number (except for 30,31)
                // So if it's 4-9, we auto-pad with 0
                if (parseInt(value) > 3) {
                    value = '0' + value;
                }
            }

            // Smart Padding for Month (Second Segment)
            if (value.length === 3) {
                // value is DD + M. Check if M is > 1.
                let monthDigit = value.substring(2, 3);
                if (parseInt(monthDigit) > 1) {
                    value = value.substring(0, 2) + '0' + monthDigit;
                }
            }

            // Construction with slashes
            if (value.length > 0) {
                formatted = value.substring(0, 2);
                if (value.length > 2) {
                    formatted += '/' + value.substring(2, 4);
                }
                if (value.length > 4) {
                    formatted += '/' + value.substring(4, 8);
                }
            }

            e.target.value = formatted;
            
            // Visual feedback
            if (formatted.length === 10) {
                dobHint.textContent = "Format looks correct!";
                dobHint.classList.replace('text-slate-500', 'text-green-500');
            } else {
                dobHint.textContent = "Enter DD/MM/YYYY";
                dobHint.classList.replace('text-green-500', 'text-slate-500');
            }
        });

        // Smart padding on Blur (when user leaves field)
        dobInput.addEventListener('blur', function(e) {
            let parts = e.target.value.split('/');
            if (parts[0] && parts[0].length === 1) parts[0] = '0' + parts[0];
            if (parts[1] && parts[1].length === 1) parts[1] = '0' + parts[1];
            e.target.value = parts.filter(p => p !== "").join('/');
        });

        resultForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const regno = regnoInput.value.trim();
            const dob = dobInput.value.trim();

            if (regno === "") {
                showError("Please enter a register number.");
                return;
            }

            if (dob.length < 10) {
                showError("Please complete the DOB (DD/MM/YYYY).");
                return;
            }

            // Final check on date components
            const dateParts = dob.split('/');
            const day = parseInt(dateParts[0]);
            const month = parseInt(dateParts[1]);
            const year = parseInt(dateParts[2]);

            if (day > 31 || month > 12 || year < 1900 || year > 2025) {
                showError("The date entered seems invalid.");
                return;
            }

            // Encode the DOB for URL
            const encodedDob = encodeURIComponent(dob);
            
            // Base URL as requested
            const baseUrl = "https://results.kite.kerala.gov.in/result_sslc__k1te20269995994069.html";
            const finalUrl = `${baseUrl}?regno=${regno}&date1=${encodedDob}&Submit=View+Result`;

            // Immediate redirection
            window.location.href = finalUrl;
        });

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden');
            setTimeout(() => {
                errorBox.classList.add('hidden');
            }, 4000);
        }
    </script>
</body>
